name: Deploy Hugo Site to Remote Server

on:
  push:
    branches:
      - main  # Triggers the workflow when you push to the main branch

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          submodules: true  # Fetches your Ezhil theme if it's a submodule
          fetch-depth: 0    # Fetches all Git history (useful if your theme relies on GitInfo)

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true  # Required by many modern themes (compiles SCSS/SASS)

      - name: Build Static Site
        run: hugo --minify

      - name: Deploy via Rsync/SSH to Server
        uses: easingthemes/ssh-deploy@v5
        env:
          # These secrets must be added to your GitHub repository settings
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          
          # Deployment configuration
          ARGS: "-rltgoDzvO --delete" # The --delete flag removes files from the server that you've deleted locally
          SOURCE: "public/" 
          TARGET: "/var/www/the-architechie.com" # ⚠️ CHANGE THIS to your actual web root directory on the server
